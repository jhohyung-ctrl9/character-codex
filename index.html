<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>캐릭터 도감</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0e12; --bg2: #16161d; --bg3: #1e1e28;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --text: #e8e6f0; --text2: #9a97aa; --text3: #5a5770;
    --accent: #b48eff; --accent2: #7c5cbf; --accent-glow: rgba(180,142,255,0.15);
    --red: #ff6b6b; --gold: #f0c060; --teal: #5dd6b5;
    --skill-normal: #6b7280; --skill-quick: #38bdf8; --skill-active: #a78bfa; --skill-ult: #f59e0b;
    --radius: 10px; --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header { border-bottom: 0.5px solid var(--border); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; background: rgba(14,14,18,0.92); backdrop-filter: blur(12px); z-index: 50; }
  .logo { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 600; color: var(--accent); letter-spacing: 0.04em; }
  .header-count { font-size: 12px; color: var(--text3); }

  /* TOOLBAR */
  .toolbar { max-width: 1100px; margin: 0 auto; padding: 28px 24px 0; display: flex; flex-direction: column; gap: 8px; }
  .toolbar-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
  .search-box { width: 100%; padding: 9px 12px 9px 36px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
  .search-box:focus { border-color: var(--accent2); }
  .search-box::placeholder { color: var(--text3); }
  .filter-select { padding: 7px 28px 7px 10px; font-size: 13px; font-family: inherit; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--text2); cursor: pointer; transition: all 0.15s; outline: none; appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%235a5770' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 10px center; }
  .filter-select:focus { border-color: var(--accent2); color: var(--text); }
  .filter-select option { background: var(--bg2); color: var(--text); }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { padding: 7px 14px; font-size: 13px; font-family: inherit; border: 0.5px solid var(--border); border-radius: 20px; background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--accent-glow); border-color: var(--accent2); color: var(--accent); }
  .add-btn { padding: 8px 18px; font-size: 13px; font-family: inherit; background: var(--accent2); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  .add-btn:hover { opacity: 0.85; }

  /* GRID */
  .grid-wrap { max-width: 1100px; margin: 0 auto; padding: 20px 24px 60px; }
  .result-info { font-size: 12px; color: var(--text3); margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 14px; }

  /* CARD */
  .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: border-color 0.2s, transform 0.2s, opacity 0.2s; }
  .card:hover { border-color: var(--accent2); transform: translateY(-3px); }
  .card.dragging { opacity: 0.35; transform: scale(0.97); cursor: grabbing; }
  .card.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent2); transform: translateY(-3px); }
  .card-img { width: 100%; aspect-ratio: 5 / 12; background: var(--bg3); display: flex; align-items: flex-start; justify-content: center; overflow: hidden; position: relative; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
  .card-img-placeholder { font-size: 52px; opacity: 0.3; }
  .card-rarity { position: absolute; top: 8px; right: 8px; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 700; letter-spacing: 0.05em; }
  .rarity-SSR { background: rgba(240,192,96,0.2); color: var(--gold); border: 0.5px solid rgba(240,192,96,0.4); }
  .rarity-SR  { background: rgba(180,142,255,0.2); color: var(--accent); border: 0.5px solid rgba(180,142,255,0.4); }
  .rarity-R   { background: rgba(93,214,181,0.15); color: var(--teal); border: 0.5px solid rgba(93,214,181,0.35); }
  .card-body { padding: 10px 12px 12px; }
  .card-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .card-title { font-size: 12px; color: var(--text2); }
  .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--text3); font-size: 14px; }

  /* OVERLAY */
  .overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); align-items: center; justify-content: center; padding: 16px; }
  .overlay.open { display: flex; }

  /* DETAIL MODAL — split layout */
  .detail-modal {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 960px;
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .detail-modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  .detail-modal-body {
    display: flex;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* LEFT — sticky image panel */
  .detail-left {
    width: 280px;
    flex-shrink: 0;
    padding: 20px 0 20px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    align-self: flex-start;
  }
  .detail-char-img {
    width: 260px;
    height: 490px;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    position: relative;
  }
  .detail-char-img img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
  .detail-img-placeholder { font-size: 56px; opacity: 0.25; }
  .detail-rarity-badge { font-size: 16px; padding: 4px 14px; border-radius: 20px; font-weight: 700; }
  .char-meta-panel { width: 100%; display: flex; flex-direction: column; gap: 6px; }
  .char-meta-row { display: flex; flex-direction: column; gap: 2px; }
  .char-meta-label { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; }
  .char-meta-value { font-size: 13px; font-weight: 500; color: var(--text); }
  .char-meta-empty { color: var(--text3); font-style: italic; }

  /* RIGHT — scrollable content */
  .detail-right {
    flex: 1;
    min-width: 0;
    overflow-y: auto;
    padding: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .detail-name { font-size: 22px; font-weight: 700; margin-bottom: 3px; }
  .detail-subtitle { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
  .detail-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .detail-tag { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: rgba(255,255,255,0.05); color: var(--text2); border: 0.5px solid var(--border); }
  .section-label { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; font-weight: 700; }

  /* SKILLS */
  .skill-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .skill-card { background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .skill-header { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; user-select: none; }
  .skill-icon { width: 42px; height: 42px; border-radius: 8px; background: var(--bg2); border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
  .skill-icon img { width: 100%; height: 100%; object-fit: cover; }
  .skill-icon-ph { font-size: 18px; opacity: 0.35; }
  .skill-info { flex: 1; min-width: 0; }
  .skill-type-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; padding: 1px 7px; border-radius: 20px; display: inline-block; margin-bottom: 3px; }
  .badge-normal { background: rgba(107,114,128,0.2); color: var(--skill-normal); border: 0.5px solid rgba(107,114,128,0.3); }
  .badge-quick  { background: rgba(56,189,248,0.15); color: var(--skill-quick);  border: 0.5px solid rgba(56,189,248,0.3); }
  .badge-active { background: rgba(167,139,250,0.15); color: var(--skill-active); border: 0.5px solid rgba(167,139,250,0.3); }
  .badge-ult    { background: rgba(245,158,11,0.15);  color: var(--skill-ult);    border: 0.5px solid rgba(245,158,11,0.3); }
  .skill-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .skill-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .lv-stepper { display: flex; align-items: center; gap: 4px; }
  .lv-btn { width: 24px; height: 24px; border-radius: 6px; background: var(--bg2); border: 0.5px solid var(--border); color: var(--text2); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .lv-btn:hover { background: var(--border); color: var(--text); }
  .lv-display { font-size: 11px; font-weight: 700; color: var(--accent); min-width: 28px; text-align: center; }
  .skill-chevron { font-size: 16px; color: var(--text3); transition: transform 0.2s; line-height: 1; }
  .skill-chevron.open { transform: rotate(90deg); }
  .skill-desc-wrap { display: none; padding: 0 12px 12px; }
  .skill-desc-wrap.open { display: block; }
  .skill-desc { font-size: 13px; color: var(--text2); line-height: 1.75; background: var(--bg2); border-radius: 8px; padding: 10px 12px; border: 0.5px solid var(--border); white-space: pre-wrap; min-height: 48px; }
  .skill-desc.empty { color: var(--text3); font-style: italic; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
  .stat-card { background: var(--bg3); border-radius: var(--radius); padding: 10px; text-align: center; }
  .stat-card-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .stat-card-val { font-size: 20px; font-weight: 700; }
  .bar-row { margin-bottom: 7px; }
  .bar-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .bar-bg { height: 5px; background: var(--bg3); border-radius: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 10px; background: var(--accent); transition: width 0.6s; }

  /* MODAL FOOTER */
  .detail-modal-footer { display: flex; gap: 8px; justify-content: flex-end; padding: 12px 20px; border-top: 0.5px solid var(--border); flex-shrink: 0; }
  .btn-ghost { padding: 8px 16px; font-size: 13px; font-family: inherit; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .btn-ghost:hover { color: var(--text); border-color: var(--text3); }
  .btn-danger { padding: 8px 16px; font-size: 13px; font-family: inherit; border: 0.5px solid rgba(255,107,107,0.4); border-radius: var(--radius); background: transparent; color: var(--red); cursor: pointer; transition: all 0.15s; }
  .btn-danger:hover { background: rgba(255,107,107,0.1); }

  /* FORM MODAL */
  .modal { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; background: var(--bg2); z-index: 1; }
  .modal-title { font-size: 16px; font-weight: 700; }
  .close-btn { width: 30px; height: 30px; background: var(--bg3); border: 0.5px solid var(--border); border-radius: 8px; color: var(--text2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .close-btn:hover { background: var(--border); }
  .modal-body { padding: 20px; }

  /* FORM */
  .form-row { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; font-weight: 500; }
  .form-input, .form-select, .form-textarea { width: 100%; padding: 9px 12px; background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent2); }
  .form-select option { background: var(--bg2); }
  .form-textarea { resize: vertical; min-height: 72px; line-height: 1.65; }
  .stats-form { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .img-upload-area { width: 100%; padding: 22px; border: 0.5px dashed var(--border2); border-radius: var(--radius); background: var(--bg3); color: var(--text3); font-size: 13px; cursor: pointer; text-align: center; transition: border-color 0.2s, background 0.2s; }
  .img-upload-area:hover { border-color: var(--accent2); background: var(--accent-glow); color: var(--text2); }
  .img-preview { width: 100%; height: 140px; object-fit: cover; border-radius: var(--radius); margin-top: 10px; display: none; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
  .form-section-title { font-size: 13px; font-weight: 700; color: var(--text); margin: 24px 0 14px; padding-bottom: 8px; border-bottom: 0.5px solid var(--border); }
  .skill-form-card { background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .skill-form-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .skill-icon-upload { width: 50px; height: 50px; border-radius: 10px; background: var(--bg2); border: 0.5px dashed var(--border2); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; overflow: hidden; transition: border-color 0.2s; font-size: 20px; color: var(--text3); }
  .skill-icon-upload:hover { border-color: var(--accent2); }
  .skill-icon-upload img { width: 100%; height: 100%; object-fit: cover; }
  .skill-form-meta { flex: 1; }
  .lv-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .lv-tab { width: 30px; height: 26px; border-radius: 6px; font-size: 11px; font-weight: 700; font-family: inherit; border: 0.5px solid var(--border); background: var(--bg2); color: var(--text3); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
  .lv-tab:hover { color: var(--text2); border-color: var(--border2); }
  .lv-tab.active { background: var(--accent-glow); border-color: var(--accent2); color: var(--accent); }

  /* RESPONSIVE */
  @media (max-width: 1100px) { .grid { grid-template-columns: repeat(6, 1fr); } }
  @media (max-width: 768px)  { .grid { grid-template-columns: repeat(4, 1fr); gap: 10px; } }
  @media (max-width: 600px) {
    header { padding: 0 16px; }
    .toolbar, .grid-wrap { padding-left: 16px; padding-right: 16px; }
    .stats-form { grid-template-columns: 1fr 1fr; }
    .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .detail-modal { max-width: 100%; }
    .detail-left { width: 130px; padding: 14px 0 14px 14px; }
    .detail-char-img { width: 116px; height: 218px; }
    .detail-right { padding: 14px; }
  }

  /* KEYWORD HIGHLIGHT */
  .kw-highlight { background: rgba(240,192,96,0.35); color: var(--gold); border-radius: 3px; padding: 0 2px; font-weight: 700; }
  .skill-tag-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 4px; background: var(--accent-glow); color: var(--accent); border: 0.5px solid var(--accent2); cursor: pointer; margin: 0 1px; transition: background 0.15s; vertical-align: baseline; }
  .skill-tag-badge:hover { background: rgba(180,142,255,0.3); }
  .keyword-wrap { position: relative; flex: 1; min-width: 160px; }
  .keyword-box { width: 100%; padding: 9px 12px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
  .keyword-box:focus { border-color: rgba(240,192,96,0.6); }
  .keyword-box::placeholder { color: var(--text3); }

  /* TAG POPUP */
  .tag-popup-btn { padding: 8px 14px; font-size: 13px; font-family: inherit; border: 0.5px solid var(--border); border-radius: var(--radius); background: transparent; color: var(--text2); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .tag-popup-btn:hover { border-color: var(--border2); color: var(--text); }
  .tag-popup { display: none; position: fixed; z-index: 300; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 14px; min-width: 260px; max-height: 400px; overflow-y: auto; scrollbar-width: thin; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .tag-popup.open { display: block; }
  .tag-popup-title { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; font-weight: 700; }
  .tag-popup-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag-popup-item { font-size: 12px; padding: 4px 12px; border-radius: 20px; background: rgba(255,255,255,0.05); color: var(--text2); border: 0.5px solid var(--border); cursor: pointer; transition: all 0.15s; }
  .tag-popup-item:hover { border-color: var(--accent2); color: var(--accent); background: var(--accent-glow); }
  .tag-popup-item.active { border-color: var(--accent2); color: var(--accent); background: var(--accent-glow); }
  .tag-popup-empty { font-size: 13px; color: var(--text3); }
</style>
</head>
<body>

<header>
  <div class="logo">캐릭터 도감</div>
  <div class="header-count" id="header-count"></div>
</header>

<div class="toolbar">
  <!-- 1행: 검색 + 버튼들 -->
  <div class="toolbar-row">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/>
        <line x1="9.5" y1="9.5" x2="13" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <input class="search-box" id="search" placeholder="이름 또는 칭호 검색..." oninput="renderGrid()" />
    </div>
    <button class="tag-popup-btn" id="tag-popup-trigger" onclick="toggleTagPopup(event)">태그 목록 ▾</button>
    <button class="tag-popup-btn" onclick="openTagDelete()" style="color:var(--red);border-color:rgba(255,107,107,0.4)">태그 지우기</button>
    <button class="btn-ghost" onclick="exportData()" style="white-space:nowrap">📤 내보내기</button>
    <button class="btn-ghost" onclick="document.getElementById('f-import-json').click()" style="white-space:nowrap">📥 가져오기</button>
    <input type="file" id="f-import-json" accept=".json" style="display:none" onchange="importData(this)"/>
    <button class="btn-ghost" onclick="openImport()" style="white-space:nowrap">엑셀 가져오기</button>
    <button class="add-btn" onclick="openAdd()">+ 추가</button>
  </div>
  <!-- 2행: 드롭다운 필터 + 키워드 + 태그 -->
  <div class="toolbar-row">
    <select class="filter-select" id="filter-class" onchange="renderGrid()">
      <option value="">클래스 전체</option>
      <option value="디펜더">디펜더</option>
      <option value="힐러">힐러</option>
      <option value="버퍼">버퍼</option>
      <option value="어쌔신">어쌔신</option>
      <option value="스트라이커">스트라이커</option>
      <option value="세이지">세이지</option>
      <option value="슈터">슈터</option>
    </select>
    <select class="filter-select" id="filter-attribute" onchange="renderGrid()">
      <option value="">속성 전체</option>
      <option value="과거">과거</option>
      <option value="현재">현재</option>
      <option value="미래">미래</option>

<script>
const STORAGE_KEY = 'codex_chars_v2';
const SKILL_TYPES = [
  { key:'passive',label:'패시브',      badge:'badge-normal', hasLevels:false, hidden:false },
  { key:'normal', label:'일반 공격',   badge:'badge-normal', hasLevels:false, hidden:false },
  { key:'quick',  label:'퀵 스킬',     badge:'badge-quick',  hasLevels:true,  hidden:false },
  { key:'quick2', label:'퀵 스킬 2',   badge:'badge-quick',  hasLevels:true,  hidden:true  },
  { key:'active', label:'액티브 스킬', badge:'badge-active', hasLevels:true,  hidden:false },
  { key:'ult',    label:'궁극기',      badge:'badge-ult',    hasLevels:true,  hidden:false },
];
// 화면에 표시되는 스킬만 (퀵스킬2 제외)
const VISIBLE_SKILLS = SKILL_TYPES.filter(s=>!s.hidden);
function emptySkill(key){ const lv=SKILL_TYPES.find(s=>s.key===key).hasLevels; return{name:'',icon:'',desc:lv?Array(10).fill(''):[''],cooltime:0}; }
function emptySkills(){ const o={}; SKILL_TYPES.forEach(s=>{o[s.key]=emptySkill(s.key);}); return o; }

let chars=loadChars();
let nextId=chars.length?Math.max(...chars.map(c=>c.id))+1:1;
let activeFilter='all',activeId=null,editMode=false,pendingImg='';
let pendingSkillIcons={},formDescCache={},formSkillLevels={};
let detailSkillLevels={},skillOpenState={};

/* ── STORAGE: IndexedDB for images, localStorage for text ── */
const DB_NAME='codex_db', DB_VER=1, IMG_STORE='images';
let db=null;

function openDB(){
  return new Promise((res,rej)=>{
    if(db){res(db);return;}
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{e.target.result.createObjectStore(IMG_STORE);};
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=e=>rej(e);
  });
}
function dbPut(key,val){
  return openDB().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(IMG_STORE,'readwrite');
    tx.objectStore(IMG_STORE).put(val,key);
    tx.oncomplete=()=>res();tx.onerror=e=>rej(e);
  }));
}
function dbGet(key){
  return openDB().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(IMG_STORE,'readonly');
    const req=tx.objectStore(IMG_STORE).get(key);
    req.onsuccess=()=>res(req.result||null);req.onerror=e=>rej(e);
  }));
}
function dbDel(key){
  return openDB().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(IMG_STORE,'readwrite');
    tx.objectStore(IMG_STORE).delete(key);
    tx.oncomplete=()=>res();tx.onerror=e=>rej(e);
  }));
}

// img key helpers
function charImgKey(id){return`char_img_${id}`;}
function skillImgKey(id,sk){return`skill_img_${id}_${sk}`;}

// save text data only (no base64 images in localStorage, but URL images are fine)
function saveChars(){
  try{
    const slim=chars.map(c=>{
      const skills={};
      SKILL_TYPES.forEach(st=>{
        const s=c.skills?.[st.key]||emptySkill(st.key);
        skills[st.key]={name:s.name,desc:s.desc,cooltime:s.cooltime||0};
      });
      // URL 이미지는 그대로 저장, base64는 IDB에 따로 저장하므로 placeholder
      const imgVal = c.img && c.img.startsWith('data:') ? '__idb__' : (c.img||'');
      return{...c,img:imgVal,skills};
    });
    localStorage.setItem(STORAGE_KEY,JSON.stringify(slim));
  }catch(e){console.warn('saveChars:',e);}
}

// after loadChars, load images from IDB and attach
async function hydrateImages(){
  for(const c of chars){
    // URL 이미지는 이미 로드됨, base64만 IDB에서 복원
    if(!c.img || c.img === '__idb__'){
      const img=await dbGet(charImgKey(c.id)).catch(()=>null);
      if(img) c.img=img;
    }
    for(const st of SKILL_TYPES){
      const icon=await dbGet(skillImgKey(c.id,st.key)).catch(()=>null);
      if(icon && c.skills?.[st.key]) c.skills[st.key].icon=icon;
    }
  }
  renderFilters();renderGrid();
}

function loadChars(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed=JSON.parse(raw);
      return parsed.map(c=>{
        const skills={};
        SKILL_TYPES.forEach(st=>{
          // 기존 저장 데이터에 해당 키가 없을 수도 있으므로 항상 emptySkill로 기본값 보장
          const saved=c.skills?.[st.key];
          const base=emptySkill(st.key);
          skills[st.key]={
            name: saved?.name ?? base.name,
            icon: '',  // 이미지는 IDB에서 별도 로드
            desc: saved?.desc ?? base.desc,
          };
        });
        return{...c,img:'',skills};
      });
    }
    const old=localStorage.getItem('codex_chars_v1');
    if(old) return JSON.parse(old).map(c=>({...c,skills:c.skills||emptySkills()}));
    return defaultChars();
  }catch{return defaultChars();}
}

// save a character's images to IDB
async function saveCharImages(c){
  if(c.img && c.img.startsWith('data:')) await dbPut(charImgKey(c.id),c.img).catch(()=>{});
  for(const st of SKILL_TYPES){
    const icon=c.skills?.[st.key]?.icon;
    if(icon && icon.startsWith('data:')) await dbPut(skillImgKey(c.id,st.key),icon).catch(()=>{});
  }
}
async function deleteCharImages(id){
  await dbDel(charImgKey(id)).catch(()=>{});
  for(const st of SKILL_TYPES) await dbDel(skillImgKey(id,st.key)).catch(()=>{});
}

function allTags(){const s=new Set();chars.forEach(c=>c.tags.forEach(t=>s.add(t)));return[...s];}
function rarityClass(r){return r?'rarity-'+r:'';}

function renderFilters(){
  document.getElementById('filters').innerHTML=
    `<button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all',this)">전체</button>`+
    allTags().map(t=>`<button class="filter-btn ${activeFilter===t?'active':''}" onclick="setFilter('${t}',this)">${t}</button>`).join('');
  renderTagChips();
}
function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderGrid();
}
function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const fc=document.getElementById('filter-class')?.value||'';
  const fa=document.getElementById('filter-attribute')?.value||'';
  return chars.filter(c=>{
    const mq=!q||c.name.toLowerCase().includes(q)||(c.title||'').toLowerCase().includes(q);
    const mf=activeFilter==='all'||c.tags.includes(activeFilter);
    const mc=!fc||(c.charClass||'')=== fc;
    const ma=!fa||(c.attribute||'')=== fa;
    return mq&&mf&&mc&&ma;
  });
}
function renderGrid(){
  const list=getFiltered();
  document.getElementById('header-count').textContent=`${chars.length}명`;
  document.getElementById('result-info').textContent=`${list.length}명 표시 중`;
  const grid=document.getElementById('grid');
  if(!list.length){grid.innerHTML='<div class="empty-state">해당하는 캐릭터가 없습니다</div>';return;}
  grid.innerHTML=list.map(c=>`
    <div class="card" data-id="${c.id}" draggable="true"
      onclick="onCardClick(event,${c.id})"
      ondragstart="onDragStart(event,${c.id})"
      ondragover="onDragOver(event)"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event,${c.id})"
      ondragend="onDragEnd(event)">
      <div class="card-img">
        ${c.img?`<img src="${c.img}" alt="${c.name}" loading="lazy"/>`:`<div class="card-img-placeholder">⚔</div>`}
        ${c.rarity?`<span class="card-rarity ${rarityClass(c.rarity)}">${c.rarity}</span>`:''}
      </div>
      <div class="card-body">
        <div class="card-name">${c.name}</div>
        <div class="card-title">${c.title||'&nbsp;'}</div>
      </div>
    </div>`).join('');
}
function maxStat(key){return Math.max(...chars.map(c=>c[key]||0),1);}

/* ── DRAG TO REORDER ── */
let dragSrcId = null;
let dragMoved = false;

function onCardClick(e, id){
  if(dragMoved) return; // 드래그 후 클릭 무시
  openDetail(id);
}
function onDragStart(e, id){
  dragSrcId = id;
  dragMoved = false;
  e.dataTransfer.effectAllowed = 'move';
  // 약간 딜레이 후 반투명 처리
  setTimeout(()=>{ const el=e.currentTarget; if(el) el.classList.add('dragging'); }, 0);
}
function onDragOver(e){
  e.preventDefault();
  dragMoved = true;
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, targetId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(dragSrcId === targetId || dragSrcId == null) return;

  // chars 배열에서 실제 인덱스 찾기 (필터된 순서가 아닌 전체 배열 기준)
  const srcIdx = chars.findIndex(c=>c.id===dragSrcId);
  const tgtIdx = chars.findIndex(c=>c.id===targetId);
  if(srcIdx<0 || tgtIdx<0) return;

  const [moved] = chars.splice(srcIdx, 1);
  chars.splice(tgtIdx, 0, moved);
  saveChars();
  renderGrid();
}
function onDragEnd(e){
  dragSrcId = null;
  document.querySelectorAll('.card').forEach(el=>{
    el.classList.remove('dragging','drag-over');
  });
  setTimeout(()=>{ dragMoved = false; }, 100);
}

/* ── 캐릭터 ID 파싱 ── */
// excelCharId(숫자)에서 표시용 캐릭터 ID 추출
// 5자리 (ex: 11030) → 앞 1 제거 → 1030
// 4자리 (ex: 1070)  → 앞 10 제거 → 70 (특수 케이스: 1070~1074)
// 그 외 4자리       → 수동 입력
function deriveCharDisplayId(excelCharId){
  if(!excelCharId) return null;
  const s = String(excelCharId);
  if(s.length === 5) return s.slice(1);       // 11030 → 1030
  if(s.length === 4 && s.startsWith('107')) return s.slice(2); // 1070 → 70
  return null;
}
// 저장된 charDisplayId 반환 (수동 입력 우선, 없으면 자동 파싱)
function getCharDisplayId(c){
  if(c.charDisplayId != null && c.charDisplayId !== '') return c.charDisplayId;
  return deriveCharDisplayId(c.excelCharId) || '';
}

  activeId=id;
  const c=chars.find(x=>x.id===id);
  document.getElementById('detail-title').textContent=c.name;

  // LEFT — sticky image + meta info

/* ── 키워드 하이라이트 & 자동 태그 ── */
let currentKeyword = '';
let isComposing = false;

// 입력 중 실시간 하이라이트만
function onKeywordHighlight(){
  currentKeyword = document.getElementById('keyword-input').value.trim();
  document.querySelectorAll('.skill-desc').forEach(el=>{
    const raw = el.dataset.raw;
    if(raw !== undefined){
      el.innerHTML = raw ? renderSkillDesc(raw) : '<span class="empty">설명 없음</span>';
    }
  });
}

function onKeywordInput(){ onKeywordHighlight(); }
function renderSkillDesc(text){
  if(!text) return '';
  const tags = allTags();
  if(!tags.length && !currentKeyword) return text;

  // 태그와 키워드를 합쳐서 처리 (긴 것 우선 매칭)
  const tagSet = new Set(tags);

  // 텍스트를 문자 단위로 순회하며 태그/키워드 매칭
  let result = '';
  let i = 0;
  while(i < text.length){
    // 태그 매칭 시도 (정확한 단어 일치)
    let matched = false;
    // 긴 태그부터 시도
    const sortedTags = [...tagSet].sort((a,b)=>b.length-a.length);
    for(const tag of sortedTags){
      if(text.slice(i, i+tag.length) === tag){
        const safeTag = tag.replace(/'/g,"\\'");
        result += `<span class="skill-tag-badge" onclick="event.stopPropagation();setFilterAndClose('${safeTag}')" title="'${tag}' 태그 필터">${tag}</span>`;
        i += tag.length;
        matched = true;
        break;
      }
    }
    if(matched) continue;

    // 키워드 하이라이트 시도
    if(currentKeyword && text.slice(i, i+currentKeyword.length) === currentKeyword){
      result += `<span class="kw-highlight">${currentKeyword}</span>`;
      i += currentKeyword.length;
      continue;
    }

    // 일반 문자
    const ch = text[i];
    result += ch === '<' ? '&lt;' : ch === '>' ? '&gt;' : ch === '&' ? '&amp;' : ch;
    i++;
  }
  return result;
}

function setFilterAndClose(tag){

  renderFilters();
  renderGrid();
  closeDetail();
}

function renderTagDeleteList(){
  const tags = [...allTags()].sort((a,b)=>a.localeCompare(b,'ko'));

  if(!tags.length){
    list.innerHTML='<span style="font-size:13px;color:var(--text3)">태그 없음</span>';

  list.innerHTML = tags.map(t=>{

      text-decoration:${sel?'line-through':''};
    ">${t}</span>`;
  }).join('');
}
function toggleTagDelete(t){
  if(selectedTagsToDelete.has(t)) selectedTagsToDelete.delete(t);
  else selectedTagsToDelete.add(t);
  renderTagDeleteList();
}
function confirmTagDelete(){
  if(!selectedTagsToDelete.size){ closeTagDelete(); return; }
  const toDelete = [...selectedTagsToDelete];
  chars.forEach(c=>{
    c.tags = c.tags.filter(t=>!toDelete.includes(t));
  });
  // 현재 필터가 삭제된 태그면 초기화
  if(toDelete.includes(activeFilter)) activeFilter = 'all';
  saveChars();
  renderFilters();
  renderGrid();
  closeTagDelete();
}

/* ── 데이터 내보내기 / 가져오기 ── */
function exportData(){
  const exportChars = chars.map(c=>{
    const skills = {};
    SKILL_TYPES.forEach(st=>{
      const sk = c.skills?.[st.key] || emptySkill(st.key);
      skills[st.key] = {name:sk.name, desc:sk.desc, cooltime:sk.cooltime||0};
    });
    return {
      id:c.id, name:c.name, title:c.title, rarity:c.rarity,
      charClass:c.charClass, attribute:c.attribute, affiliation:c.affiliation,
      charDisplayId:c.charDisplayId, excelCharId:c.excelCharId,
      tags:c.tags, atk:c.atk, def:c.def, hp:c.hp, spd:c.spd, mag:c.mag, lck:c.lck,
      img: c.img && !c.img.startsWith('data:') ? c.img : '',
      skills,
    };
  });

  const json = JSON.stringify({version:2, exportedAt: new Date().toISOString(), chars: exportChars}, null, 2);

  // 클립보드 복사 시도
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(json).then(()=>{
      alert(`✓ JSON이 클립보드에 복사됐어요!\n\n메모장을 열고 Ctrl+V로 붙여넣은 뒤\n파일명을 "도감데이터.json" 으로 저장하세요.`);
    }).catch(()=>fallbackCopy(json));
  } else {
    fallbackCopy(json);
  }
}

function fallbackCopy(json){
  // textarea 방식으로 복사
  const ta = document.createElement('textarea');
  ta.value = json;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  const ok = document.execCommand('copy');
  document.body.removeChild(ta);
  if(ok){
    alert(`✓ JSON이 클립보드에 복사됐어요!\n\n메모장을 열고 Ctrl+V로 붙여넣은 뒤\n파일명을 "도감데이터.json" 으로 저장하세요.`);

async function importData(input){
  const file = input.files[0];
  if(!file) return;
  input.value = '';
  const text = await file.text();
  try{
    const data = JSON.parse(text);
    const importedChars = data.chars || (Array.isArray(data) ? data : null);
    if(!importedChars){ alert('올바른 도감 파일이 아닙니다.'); return; }

    if(!confirm(`${importedChars.length}명의 캐릭터를 가져옵니다.\n현재 데이터를 덮어씁니다. 계속할까요?`)) return;

    // 기존 IDB 이미지 모두 삭제
    for(const c of chars) await deleteCharImages(c.id).catch(()=>{});

    chars = importedChars.map(c=>({...c, img: c.img && c.img.startsWith('data:') ? c.img : (c.img||'')}));
    nextId = chars.length ? Math.max(...chars.map(c=>c.id))+1 : 1;

    // IDB에 이미지 저장
    for(const c of chars){
      if(c.img && c.img.startsWith('data:')) await dbPut(charImgKey(c.id), c.img).catch(()=>{});
      for(const st of SKILL_TYPES){
        const icon = c.skills?.[st.key]?.icon;
        if(icon && icon.startsWith('data:')) await dbPut(skillImgKey(c.id, st.key), icon).catch(()=>{});
      }
      // 저장 후 img는 URL이 아닌 base64는 IDB 참조로 교체
      if(c.img && c.img.startsWith('data:')) c.img = c.img; // 메모리엔 유지
    }

    saveChars();
    await hydrateImages();
    renderFilters();
    renderGrid();
    alert(`✓ ${chars.length}명의 캐릭터를 가져왔습니다.`);
  } catch(e){
    alert('파일 파싱 오류: ' + e.message);
  }
}

/* ── 태그 직접 추가 ── */
function addTagFromInput(){
  const input = document.getElementById('tag-add-input');
  const tag = input.value.trim();
  if(!tag) return;
  input.value = '';
  // 모든 캐릭터에 태그 추가 (이미 있으면 스킵)
  let changed = false;
  chars.forEach(c=>{
    if(!c.tags.includes(tag)){
      c.tags.push(tag);
      changed = true;
    }
  });
  if(changed){ saveChars(); renderFilters(); renderGrid(); }
  renderTagChips();
}

function renderTagChips(){
  const tags = [...allTags()].sort((a,b)=>a.localeCompare(b,'ko'));
  const el = document.getElementById('tag-chips');
  if(!el) return;
  if(!tags.length){ el.innerHTML='<span style="font-size:12px;color:var(--text3)">추가된 태그 없음</span>'; return; }
  el.innerHTML = tags.map(t=>`
    <span onclick="setFilterFromChip('${t.replace(/'/g,"\\'")}')"
      style="font-size:12px;padding:4px 10px;border-radius:20px;cursor:pointer;transition:all 0.15s;
        background:${activeFilter===t?'var(--accent-glow)':'rgba(255,255,255,0.05)'};
        color:${activeFilter===t?'var(--accent)':'var(--text2)'};
        border:0.5px solid ${activeFilter===t?'var(--accent2)':'var(--border)'}">
      ${t}
    </span>`).join('');
}

function setFilterFromChip(t){
  activeFilter = activeFilter===t ? 'all' : t;
  renderFilters();
  renderGrid();
  renderTagChips();
}
function updateTestImg(url){

/* ── xlsx 파싱 (SheetJS) - TextKey 파일 & Skill_CS 파일 모두 지원 ── */
function parseXlsxFile(file){
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

      if(rows.length < 2){ alert('데이터가 없습니다.'); return; }

      const SLOT = {'0':'passive','1':'normal','2':'quick','3':'quick2','4':'active','5':'ult'};
      const parsed = {};

      // 헤더 행 찾기
      let headerRow = -1;
      let uidCol = -1, nameCol = -1, fileType = '';

      for(let r=0; r<Math.min(5,rows.length); r++){
        const row = rows[r];
        for(let c=0; c<row.length; c++){
          const v = String(row[c]).trim();
          if(v === 'UID') uidCol = c;
          if(v === 'KO') { nameCol = c; fileType = 'textkey'; }
          if(v === '#SkillNameText') { nameCol = c; fileType = 'skillcs'; }
        }
        if(uidCol >= 0 && nameCol >= 0){ headerRow = r; break; }
      }

      if(uidCol < 0 || nameCol < 0){
        alert('지원하지 않는 파일 형식입니다.\nData_Skill_CS_PC.xlsx 파일을 사용해주세요.');
        return;
      }

      // Data_TextKey_C_SkillPC 파일 차단
      if(fileType === 'textkey'){
        alert('Data_TextKey_C_SkillPC.xlsx는 지원하지 않습니다.\nData_Skill_CS_PC.xlsx 파일을 사용해주세요.');
        return;
      }

      // #SkillDescriptionText, CoolTimeValue 컬럼 위치 찾기
      let descCol = -1, coolCol = -1;
      const hrow = rows[headerRow];
      for(let c=0; c<hrow.length; c++){
        const v = String(hrow[c]).trim();
        if(v === '#SkillDescriptionText') descCol = c;
        if(v === 'CoolTimeValue') coolCol = c;
      }

      // <TagName>텍스트</> 형태 태그 제거 함수
      function stripTags(str){
        if(!str || str === 'nan') return '';
        return str.replace(/<[^>]*>/g, '').trim();
      }

      for(let r=headerRow+1; r<rows.length; r++){
        const row = rows[r];
        let raw = '', name = '', desc = '', cool = 0;

        if(fileType === 'textkey'){
          const uid = String(row[uidCol]||'').trim();
          if(!uid.startsWith('Skill_PC_SkillName_')) continue;
          raw = uid.replace('Skill_PC_SkillName_','');
          if(!/^1\d{7,8}$/.test(raw)) continue;
          name = String(row[nameCol]||'').trim();
        } else {
          const uid = String(row[uidCol]||'').trim();
          if(!/^1\d{7,8}$/.test(uid)) continue;
          raw = uid;
          name = String(row[nameCol]||'').trim();
          desc = descCol >= 0 ? stripTags(String(row[descCol]||'')) : '';
          cool = coolCol >= 0 ? (parseInt(row[coolCol])||0) : 0;
        }

        const nnn  = raw.slice(-3);
        if(nnn !== '001') continue;
        const rest  = raw.slice(0,-3);
        const slot  = rest.slice(-1);
        const cgrp  = rest.slice(0,-1);
        const stype = SLOT[slot];
        if(!stype || !name || name==='nan') continue;

        if(!parsed[cgrp]) parsed[cgrp] = {charId:parseInt(cgrp),passiveName:'',normalName:'',quickName:'',quick2Name:'',activeName:'',ultName:'',
          passiveDesc:'',normalDesc:'',quickDesc:'',quick2Desc:'',activeDesc:'',ultDesc:'',
          passiveCool:0,normalCool:0,quickCool:0,quick2Cool:0,activeCool:0,ultCool:0};
        if(!parsed[cgrp][stype+'Name']) parsed[cgrp][stype+'Name'] = name;
        if(!parsed[cgrp][stype+'Desc'] && desc) parsed[cgrp][stype+'Desc'] = desc;
        if(!parsed[cgrp][stype+'Cool'] && cool) parsed[cgrp][stype+'Cool'] = cool;
      }

      const count = Object.keys(parsed).length;
      if(count === 0){ alert('파싱된 캐릭터가 없습니다. 파일을 확인해주세요.'); return; }

      EXCEL_SKILL_DATA = {...EXCEL_SKILL_DATA};
      for(const [, d] of Object.entries(parsed)){
        EXCEL_SKILL_DATA[String(d.charId)] = d;
      }

      document.getElementById('xlsx-status').textContent = `✓ ${count}개 캐릭터 로드 완료`;
      document.getElementById('xlsx-status').style.color = 'var(--teal)';
      refreshImportList();
    } catch(err){
      alert('파일 파싱 오류: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function refreshImportList(){
  renderImportList(
    document.getElementById('import-search').value,
    document.getElementById('import-id-from').value,
    document.getElementById('import-id-to').value
  );
}

function openImport(){
  document.getElementById('import-overlay').classList.add('open');
  document.getElementById('xlsx-status').textContent='';
  renderImportList('','','');
}
function closeImport(){
  document.getElementById('import-overlay').classList.remove('open');
}
function renderImportList(filterName, idFrom, idTo){
  const from = idFrom ? parseInt(idFrom) : -Infinity;
  const to   = idTo   ? parseInt(idTo)   : Infinity;
  const q    = filterName.toLowerCase().trim();

  const entries = Object.values(EXCEL_SKILL_DATA).filter(d=>{
    const inRange = d.charId >= from && d.charId <= to;
    const matchName = !q ||
      (d.normalName||'').toLowerCase().includes(q) ||
      (d.quickName||'').toLowerCase().includes(q) ||
      (d.activeName||'').toLowerCase().includes(q) ||
      (d.passiveName||'').toLowerCase().includes(q);
    return inRange && matchName;
  }).sort((a,b)=>a.charId-b.charId);

  const alreadyImported = new Set(
    chars.filter(c=>c.excelCharId!=null).map(c=>c.excelCharId)
  );

  const list = document.getElementById('import-list');
  if(!entries.length){
    list.innerHTML='<div style="color:var(--text3);font-size:13px;padding:20px;text-align:center">해당하는 캐릭터가 없습니다</div>';
    return;
  }
  list.innerHTML = entries.map(d=>{
    const imported = alreadyImported.has(d.charId);
    const displayId = String(d.charId).length===5 ? String(d.charId).slice(1)
                    : (String(d.charId).length===4 && String(d.charId).startsWith('107')) ? String(d.charId).slice(2)
                    : String(d.charId);
    return`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border)">
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;color:var(--text3);margin-bottom:2px">ID ${displayId}</div>
        <div style="font-size:14px;font-weight:500">${d.normalName||'(기본공격 없음)'}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:3px">
          패시브: ${d.passiveName||'-'} &nbsp;·&nbsp; 퀵: ${d.quickName||'-'} &nbsp;·&nbsp; 액티브: ${d.activeName||'-'} &nbsp;·&nbsp; 궁극기: ${d.ultName||'-'}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0;align-items:flex-end">
        ${imported
          ? `<span style="font-size:11px;color:var(--teal);padding:3px 10px;border:0.5px solid rgba(93,214,181,0.35);border-radius:20px">반영됨</span>
             <button onclick="updateChar(${d.charId})" style="padding:4px 10px;font-size:11px;font-family:inherit;background:transparent;color:var(--text2);border:0.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;white-space:nowrap" title="이미지·클래스·속성 유지, 나머지 갱신">↻ 데이터 갱신</button>`
          : `<button onclick="importChar(${d.charId})" style="padding:5px 14px;font-size:12px;font-family:inherit;background:var(--accent2);color:#fff;border:none;border-radius:var(--radius);cursor:pointer">추가</button>`
        }
      </div>
    </div>`;
  }).join('');
}

// 이미지·클래스·속성 유지하고 스킬명/설명/이름 등 갱신
function updateChar(charId){
  const d = EXCEL_SKILL_DATA[String(charId)];
  if(!d) return;
  const existing = chars.find(c=>c.excelCharId===charId);
  if(!existing) return;

  const MAP = [
    {key:'passive', nameF:'passiveName', descF:'passiveDesc', coolF:'passiveCool'},
    {key:'normal',  nameF:'normalName',  descF:'normalDesc',  coolF:'normalCool'},
    {key:'quick',   nameF:'quickName',   descF:'quickDesc',   coolF:'quickCool'},
    {key:'quick2',  nameF:'quick2Name',  descF:'quick2Desc',  coolF:'quick2Cool'},
    {key:'active',  nameF:'activeName',  descF:'activeDesc',  coolF:'activeCool'},
    {key:'ult',     nameF:'ultName',     descF:'ultDesc',     coolF:'ultCool'},
  ];

  const skills = existing.skills || emptySkills();
  MAP.forEach(({key, nameF, descF, coolF})=>{
    skills[key].name = d[nameF] || '';
    skills[key].cooltime = d[coolF] || 0;
    const existingDesc = skills[key].desc;
    const hasCustomDesc = existingDesc && existingDesc.some(v=>v && v.trim());
    if(!hasCustomDesc){
      const desc = d[descF] || '';
      const st = SKILL_TYPES.find(s=>s.key===key);
      skills[key].desc = desc
        ? (st.hasLevels ? Array(10).fill(desc) : [desc])
        : (st.hasLevels ? Array(10).fill('') : ['']);
    }
  });

  const idx = chars.findIndex(c=>c.id===existing.id);
  chars[idx] = {
    ...existing,
    // 갱신할 항목
    name:    d.normalName || existing.name,
    skills,
    // 유지할 항목: img, charClass, attribute, affiliation, rarity, title, tags, stats
  };

  saveChars();
  renderFilters();
  renderGrid();
  refreshImportList();
}

function importChar(charId){
  const d = EXCEL_SKILL_DATA[String(charId)];
  if(!d) return;
  const skills = emptySkills();

  // 스킬 이름 + 설명 채우기
  const MAP = [
    {key:'passive', nameF:'passiveName', descF:'passiveDesc', coolF:'passiveCool'},
    {key:'normal',  nameF:'normalName',  descF:'normalDesc',  coolF:'normalCool'},
    {key:'quick',   nameF:'quickName',   descF:'quickDesc',   coolF:'quickCool'},
    {key:'quick2',  nameF:'quick2Name',  descF:'quick2Desc',  coolF:'quick2Cool'},
    {key:'active',  nameF:'activeName',  descF:'activeDesc',  coolF:'activeCool'},
    {key:'ult',     nameF:'ultName',     descF:'ultDesc',     coolF:'ultCool'},
  ];
  MAP.forEach(({key, nameF, descF, coolF})=>{
    skills[key].name = d[nameF] || '';
    skills[key].cooltime = d[coolF] || 0;
    const desc = d[descF] || '';
    if(desc){
      const st = SKILL_TYPES.find(s=>s.key===key);
      if(st.hasLevels){
        skills[key].desc = Array(10).fill(desc);
      } else {
        skills[key].desc = [desc];
      }
    }
  });

  const newChar = {
    id: nextId++, name: d.normalName||`캐릭터 ${charId}`,
    title:'', rarity:'', tags:[], img:'',
    atk:0, def:0, hp:0, spd:0, mag:0, lck:0,
    charDisplayId: deriveCharDisplayId(charId) || '',
    skills, excelCharId: charId,
  };
  chars.push(newChar);
  saveChars(); renderFilters(); renderGrid(); refreshImportList();
}

// init
renderFilters();
renderGrid();
hydrateImages();
</script>

        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">

          oninput="refreshImportList()"/>

</div>
